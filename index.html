<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Photo Booth Pro</title>
  <style>
    :root{
      --bg:#0f1115; --card:#171a21; --text:#e8ecf1; --muted:#9aa3b2;
      --accent:#6ea8fe; --danger:#ff6b6b;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
      background:linear-gradient(180deg,#0b0d12,#121622);
      color:var(--text);
      display:flex; flex-direction:column; align-items:center; gap:14px; padding:14px;
    }
    .wrap{width:100%; max-width:420px}
    .card{
      background:var(--card); border-radius:16px; padding:14px; box-shadow:0 10px 30px rgba(0,0,0,.35);
    }
    h2{margin:6px 0 10px; text-align:center}
    .stage{
      position:relative; overflow:hidden; border-radius:14px; background:#000;
    }
    video, canvas{
      width:100%; height:auto; display:block;
    }
    .overlay{
      position:absolute; inset:0; pointer-events:none;
      display:flex; align-items:center; justify-content:center;
      font-size:56px; font-weight:700; color:#fff;
      text-shadow:0 4px 20px rgba(0,0,0,.6);
      opacity:0; transition:.2s;
    }
    .flash{
      position:absolute; inset:0; background:#fff; opacity:0;
      transition:opacity .15s ease;
    }
    .controls{
      display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:10px;
    }
    button, select{
      padding:10px 12px; border-radius:10px; border:none; cursor:pointer;
      background:#232838; color:var(--text);
    }
    button.primary{background:var(--accent); color:#0b1220; font-weight:600}
    button.warn{background:var(--danger); color:#200}
    .row{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px}
    .small{font-size:12px; color:var(--muted)}
    .preview{
      margin-top:10px; border-radius:12px; overflow:hidden; background:#000;
    }
    .footer{font-size:12px; color:var(--muted); text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>📸 Photo Booth Pro</h2>

      <div class="stage">
        <video id="video" autoplay playsinline></video>
        <div id="overlay" class="overlay">3</div>
        <div id="flash" class="flash"></div>
      </div>

      <div class="controls">
        <button id="btnStart" class="primary">Mulai Kamera</button>
        <button id="btnSwitch">Ganti Kamera</button>

        <button id="btnShot" class="primary">Ambil Foto</button>
        <button id="btnCountdown">Countdown (3s)</button>

        <select id="filter">
          <option value="none">Filter: Normal</option>
          <option value="vintage">Vintage</option>
          <option value="bw">B/W</option>
          <option value="warm">Warm</option>
          <option value="cool">Cool</option>
          <option value="contrast">High Contrast</option>
        </select>
        <button id="btnMirror">Mirror: OFF</button>
      </div>

      <div class="row">
        <button id="btnDownload">Download</button>
        <button id="btnClear" class="warn">Clear</button>
      </div>

      <div class="preview">
        <canvas id="canvas"></canvas>
      </div>

      <div class="footer">Akan meminta izin kamera. Semua pemotretan dilakukan di perangkatmu.</div>
    </div>
  </div>

<script>
  const video = document.getElementById('video')
  const canvas = document.getElementById('canvas')
  const ctx = canvas.getContext('2d')
  const overlay = document.getElementById('overlay')
  const flash = document.getElementById('flash')

  const btnStart = document.getElementById('btnStart')
  const btnSwitch = document.getElementById('btnSwitch')
  const btnShot = document.getElementById('btnShot')
  const btnCountdown = document.getElementById('btnCountdown')
  const btnDownload = document.getElementById('btnDownload')
  const btnClear = document.getElementById('btnClear')
  const filterSel = document.getElementById('filter')
  const btnMirror = document.getElementById('btnMirror')

  let stream = null
  let facing = "user" // front/back
  let mirror = false
  let lastImage = null

  async function startCamera(){
    try{
      if(stream) stream.getTracks().forEach(t=>t.stop())
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facing }, audio:false
      })
      video.srcObject = stream
    }catch(e){
      alert("Kamera tidak diizinkan / tidak tersedia")
    }
  }

  function switchCamera(){
    facing = (facing === "user") ? "environment" : "user"
    startCamera()
  }

  function setMirror(){
    mirror = !mirror
    video.style.transform = mirror ? "scaleX(-1)" : "scaleX(1)"
    btnMirror.textContent = "Mirror: " + (mirror ? "ON" : "OFF")
  }

  function applyFilter(ctx, w, h){
    const f = filterSel.value
    if(f === "none") return
    const img = ctx.getImageData(0,0,w,h)
    const d = img.data

    for(let i=0;i<d.length;i+=4){
      let r=d[i], g=d[i+1], b=d[i+2]

      if(f==="bw"){
        const avg=(r+g+b)/3
        d[i]=d[i+1]=d[i+2]=avg
      }
      if(f==="vintage"){
        d[i]=r*0.9+20
        d[i+1]=g*0.7+15
        d[i+2]=b*0.4+10
      }
      if(f==="warm"){
        d[i]=r+20
      }
      if(f==="cool"){
        d[i+2]=b+20
      }
      if(f==="contrast"){
        d[i]=((r-128)*1.4)+128
        d[i+1]=((g-128)*1.4)+128
        d[i+2]=((b-128)*1.4)+128
      }
    }

    ctx.putImageData(img,0,0)
  }

  function takePhoto(){
    const w = video.videoWidth
    const h = video.videoHeight
    canvas.width = w
    canvas.height = h

    if(mirror){
      ctx.translate(w,0)
      ctx.scale(-1,1)
    }

    ctx.drawImage(video,0,0,w,h)

    if(mirror){
      ctx.setTransform(1,0,0,1,0,0)
    }

    applyFilter(ctx,w,h)

    // flash effect
    flash.style.opacity = 1
    setTimeout(()=> flash.style.opacity = 0, 120)

    lastImage = canvas.toDataURL("image/png")
  }

  function countdownShot(){
    let n = 3
    overlay.style.opacity = 1
    overlay.textContent = n

    const timer = setInterval(()=>{
      n--
      if(n<=0){
        clearInterval(timer)
        overlay.style.opacity = 0
        takePhoto()
      } else {
        overlay.textContent = n
      }
    },1000)
  }

  function download(){
    if(!lastImage) return alert("Belum ada foto")
    const a = document.createElement("a")
    a.href = lastImage
    a.download = "foto.png"
    a.click()
  }

  function clearCanvas(){
    ctx.clearRect(0,0,canvas.width,canvas.height)
    lastImage = null
  }

  btnStart.onclick = startCamera
  btnSwitch.onclick = switchCamera
  btnMirror.onclick = setMirror
  btnShot.onclick = takePhoto
  btnCountdown.onclick = countdownShot
  btnDownload.onclick = download
  btnClear.onclick = clearCanvas
</script>

</body>
</html>

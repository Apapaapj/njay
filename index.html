<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rank Ibadah Ultimate Pro</title>
  <style>
    body { font-family: Arial; background: linear-gradient(135deg,#020617,#0f172a); color: white; text-align: center; }
    .card { background: #1e293b; padding: 20px; border-radius: 20px; width: 340px; margin: 20px auto; box-shadow: 0 0 20px rgba(0,0,0,0.5);}    
    button { padding: 10px; margin: 5px; border: none; border-radius: 10px; cursor: pointer; width: 90%; }
    .done { background: #22c55e; }
    .miss { background: #ef4444; }
    .progress { height: 10px; background: #334155; border-radius: 10px; overflow: hidden; margin: 10px 0; }
    .bar { height: 100%; background: gold; width: 0%; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Rank Ibadah 🏆</h1>
    <h2 id="rank">Warrior</h2>
    <p>Bintang: <span id="star">0</span></p>
    <p>Streak: <span id="streak">0</span> 🔥</p>
    <p>Season Bulan: <span id="season"></span></p><div class="progress"><div class="bar" id="bar"></div></div>

<h3>Checklist Sholat</h3>
<button class="done" onclick="sholat('subuh')">Subuh</button>
<button class="done" onclick="sholat('dzuhur')">Dzuhur</button>
<button class="done" onclick="sholat('ashar')">Ashar</button>
<button class="done" onclick="sholat('maghrib')">Maghrib</button>
<button class="done" onclick="sholat('isya')">Isya</button>

<button class="miss" onclick="resetDay()">Hari Terlewat ❌</button>
<button onclick="requestNotif()">Aktifkan Notifikasi 🔔</button>

  </div><audio id="sound" src="https://www.myinstants.com/media/sounds/ml-rank-up.mp3"></audio>

<script>
let star = parseInt(localStorage.getItem('star') || 0);
let streak = parseInt(localStorage.getItem('streak') || 0);
let doneToday = JSON.parse(localStorage.getItem('doneToday') || '{}');

// SEASON
let now = new Date();
let currentMonth = now.getMonth();
let lastMonth = parseInt(localStorage.getItem('lastMonth') || currentMonth);

if (currentMonth !== lastMonth) {
  // reset season
  star = 0;
  streak = 0;
  doneToday = {};
  localStorage.setItem('lastMonth', currentMonth);
  alert("🏆 Season Baru Dimulai! Rank direset!");
}

document.getElementById('season').innerText = now.toLocaleString('id-ID', { month: 'long' });

const ranks = [
  { name: "Warrior", min: 0 },
  { name: "Elite", min: 5 },
  { name: "Master", min: 10 },
  { name: "Grandmaster", min: 15 },
  { name: "Epic", min: 20 },
  { name: "Legend", min: 25 },
  { name: "Mythic", min: 30 },
  { name: "Mythic Immortal", min: 40 }
];

function getRank(star) {
  let current = ranks[0].name;
  for (let i = 0; i < ranks.length; i++) {
    if (star >= ranks[i].min) current = ranks[i].name;
  }
  return current;
}

function update() {
  document.getElementById('star').innerText = star;
  document.getElementById('rank').innerText = getRank(star);
  document.getElementById('streak').innerText = streak;

  let next = ranks.find(r => r.min > star);
  let percent = next ? (star / next.min) * 100 : 100;
  document.getElementById('bar').style.width = percent + "%";

  localStorage.setItem('star', star);
  localStorage.setItem('streak', streak);
  localStorage.setItem('doneToday', JSON.stringify(doneToday));
}

function sholat(waktu) {
  if (!doneToday[waktu]) {
    star++;
    doneToday[waktu] = true;

    if (Object.keys(doneToday).length === 5) {
      streak++;
      document.getElementById('sound').play();
      notify("🔥 FULL SHOLAT! Rank Up!");
    }

    update();
  }
}

function resetDay() {
  doneToday = {};
  streak = 0;
  star = Math.max(0, star - 3);
  update();
}

function requestNotif() {
  Notification.requestPermission();
}

function notify(text) {
  if (Notification.permission === "granted") {
    new Notification(text);
  }
}

setInterval(() => {
  let now = new Date();
  let hour = now.getHours();

  if (hour === 4) notify("Waktu Subuh");
  if (hour === 12) notify("Waktu Dzuhur");
  if (hour === 15) notify("Waktu Ashar");
  if (hour === 18) notify("Waktu Maghrib");
  if (hour === 19) notify("Waktu Isya");
}, 60000);

update();
</script></body>
</html>
